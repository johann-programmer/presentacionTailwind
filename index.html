<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSpace - Para Desarrolladores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Habilita el dark mode manual
            theme: {
                extend: {
                    colors: {
                        'marca': '#3b82f6', // Azul Tailwind por defecto
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-gray-900 transition-colors duration-300">
    
   <!-- NAVEGACIÓN -->
    <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter text-marca">
            CodeSpace.
        </div>
        <div>
            <a href="#" class="text-gray-600 hover:text-marca font-medium mr-6">Inicio</a>
            <button class="bg-gray-900 text-white px-5 py-2 rounded-lg font-medium">Entrar</button>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <main class="max-w-6xl mx-auto px-6 mt-20 flex flex-col md:flex-row items-center gap-12">
        <!-- Textos -->
        <div class="md:w-1/2">
            <h1 class="text-5xl font-extrabold leading-tight">
                El mejor espacio para <span class="text-marca">escribir código.</span>
            </h1>
            <p class="mt-6 text-lg text-gray-600">
                Únete a nuestra comunidad de desarrolladores. Aprende, conecta y construye el futuro en un ambiente diseñado para ti.
            </p>
            <div class="mt-8 flex gap-4">
                <button class="bg-marca text-white px-8 py-3 rounded-lg font-bold">Unirse ahora</button>
                <button class="bg-gray-200 text-gray-800 px-8 py-3 rounded-lg font-bold">Ver planes</button>
            </div>
        </div>
        
        <!-- Aquí irá la imagen en el siguiente commit -->
    </main>

</body>
</html>
